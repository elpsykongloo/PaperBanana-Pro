name: CI

on:
  push:
  pull_request:

jobs:
  repo-first-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync locked environment
        run: uv sync --locked --python 3.12

      - name: Compile Python sources
        run: uv run python -m compileall agents providers utils visualize tests cli.py demo.py main.py

      - name: Run unit tests with diagnostics
        run: uv run python scripts/ci_unittest_runner.py --output-dir artifacts/ci/unit-tests

      - name: Upload unit test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repo-first-windows-unit-test-diagnostics
          path: artifacts/ci/unit-tests
          if-no-files-found: ignore

      - name: Install editable CLI
        run: uv tool install --editable . --force

      - name: Add uv tool bin to PATH
        shell: pwsh
        run: |
          $toolBin = uv tool dir --bin
          $toolBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify CLI entrypoints resolve
        shell: pwsh
        run: |
          Write-Host "PATH entries:"
          $env:PATH -split ';' | ForEach-Object { Write-Host "  $_" }
          $pb = Get-Command paperbanana -ErrorAction SilentlyContinue
          if ($pb) { Write-Host "paperbanana => $($pb.Source)" }
          else { Write-Host "::error::paperbanana not found on PATH"; exit 1 }

      - name: Smoke test global CLI entrypoints
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $smokeScript = Join-Path $repoRoot "scripts/ci_smoke_streamlit.ps1"
          $smokeDir = Join-Path $env:RUNNER_TEMP "paperbanana-cli-smoke"
          New-Item -ItemType Directory -Path $smokeDir -Force | Out-Null
          Push-Location $smokeDir
          try {
            & $smokeScript -Label "gui-primary" -Port 8501 -Executable "paperbanana"
            & $smokeScript -Label "viewer-evolution" -Port 8512 -Executable "paperbanana" -Arguments @("viewer", "evolution")
            & $smokeScript -Label "viewer-eval" -Port 8513 -Executable "paperbanana" -Arguments @("viewer", "eval")
            paperbanana --help
            if ($LASTEXITCODE -ne 0) { throw "paperbanana --help exited $LASTEXITCODE" }
            paperbanana-pro --help
            if ($LASTEXITCODE -ne 0) { throw "paperbanana-pro --help exited $LASTEXITCODE" }
            paperbanana run --help
            if ($LASTEXITCODE -ne 0) { throw "paperbanana run --help exited $LASTEXITCODE" }
          }
          catch {
            Write-Host "::error::Smoke test failed: $($_.Exception.Message)"
            $fullMsg = $_.Exception.Message -replace "`n","`n  "
            Write-Host "Full error:`n  $fullMsg"
            # Dump all smoke log files for diagnosis
            $logFiles = Get-ChildItem $env:RUNNER_TEMP -Filter "paperbanana-*.log" -ErrorAction SilentlyContinue
            foreach ($lf in $logFiles) {
              Write-Host "--- $($lf.Name) ---"
              Get-Content $lf.FullName -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
              Write-Host "--- end $($lf.Name) ---"
            }
            throw
          }
          finally {
            Pop-Location
          }

      - name: Upload smoke test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: ${{ runner.temp }}/paperbanana-*.log
          if-no-files-found: ignore
