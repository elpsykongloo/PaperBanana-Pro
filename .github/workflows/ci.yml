name: CI

on:
  push:
  pull_request:

jobs:
  repo-first-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync locked environment
        run: uv sync --locked --python 3.12

      - name: Compile Python sources
        run: uv run python -m compileall cli.py demo.py main.py utils visualize tests

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests

      - name: Install editable CLI
        run: uv tool install --editable . --force

      - name: Add uv tool bin to PATH
        shell: pwsh
        run: |
          $toolBin = uv tool dir --bin
          $toolBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Smoke test CLI entrypoint
        run: paperbanana-pro --help
